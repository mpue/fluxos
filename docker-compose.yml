version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fluxos-postgres
    environment:
      - POSTGRES_USER=fluxos
      - POSTGRES_PASSWORD=fluxos_dev_password
      - POSTGRES_DB=fluxos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fluxos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxos"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fluxos-server
    ports:
      - "5000:5000"
    volumes:
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://fluxos:fluxos_dev_password@postgres:5432/fluxos_db
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxos-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fluxos-client
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/webpack.config.js:/app/webpack.config.js
      - ./client/package.json:/app/package.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - server
    networks:
      - fluxos-network

networks:
  fluxos-network:
    driver: bridge

volumes:
  postgres-data:
