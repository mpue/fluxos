version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fluxos-server-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    networks:
      - fluxos-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: fluxos-client-prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - fluxos-network

networks:
  fluxos-network:
    driver: bridge
